<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="linkedin-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004182;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#linkedin-bg)"/>
  <g opacity="0.1">
    <circle cx="100" cy="80" r="40" fill="white"/>
    <circle cx="250" cy="120" r="30" fill="white"/>
    <circle cx="180" cy="280" r="35" fill="white"/>
    <circle cx="350" cy="200" r="25" fill="white"/>
    <circle cx="400" cy="50" r="20" fill="white"/>
    <line x1="100" y1="80" x2="250" y2="120" stroke="white" stroke-width="2"/>
    <line x1="250" y1="120" x2="350" y2="200" stroke="white" stroke-width="2"/>
    <line x1="100" y1="80" x2="180" y2="280" stroke="white" stroke-width="2"/>
    <line x1="250" y1="120" x2="400" y2="50" stroke="white" stroke-width="2"/>
  </g>
  <text x="60" y="210" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" opacity="0.9">LinkedIn Articles</text>
  <text x="60" y="250" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.7">Thought leadership and professional insights</text>
  <rect x="880" y="30" width="280" height="340" rx="20" fill="white" opacity="0.08"/>
  <text x="900" y="200" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.15" text-anchor="middle">📝</text>
  <g filter="url(#glow)">
    <circle cx="1020" cy="120" r="4" fill="white" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="300" r="3" fill="white" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="250" r="5" fill="white" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>